name: soundhoard - Test

on:
  push:
    paths:
      - "soundhoard/**"
      - ".github/workflows/soundhoard-test.yml"

defaults:
  run:
    working-directory: soundhoard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install

      - run: uv sync --dev

      - name: Check formatting and linting
        run: make check-format

      - name: Type check
        run: make typecheck

      - name: Test with pytest
        run: make test
